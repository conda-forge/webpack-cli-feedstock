context:
  version: "7.0.2"

package:
  name: webpack-cli
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/webpack-cli/-/webpack-cli-${{ version }}.tgz
  sha256: aff76cea56dd87feb531c2fa0681c1672abd2bf0955d368986c1ad21741cbe82

build:
  number: 0
  noarch: generic

requirements:
  build:
    - nodejs
    - pnpm
    - pnpm-licenses
  run:
    - nodejs

tests:
  - script:
      - webpack-cli --help

about:
  license: MIT
  license_file:
    - LICENSE
    - third-party-licenses.txt
  summary: A bundler for javascript and friends.
  homepage: https://github.com/webpack/webpack-cli
  repository: https://github.com/webpack/webpack-cli

extra:
  recipe-maintainers:
    - danielnachun
