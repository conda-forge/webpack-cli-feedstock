context:
  version: "7.0.1"

package:
  name: webpack-cli
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/webpack-cli/-/webpack-cli-${{ version }}.tgz
  sha256: b3cc0855a55c94c27d13115c37afb03db0a1bc6d99270ff94258a243c8f649d6

build:
  number: 0
  noarch: generic

requirements:
  build:
    - nodejs
    - pnpm
    - pnpm-licenses
  run:
    - nodejs

tests:
  - script:
      - webpack-cli --help

about:
  license: MIT
  license_file:
    - LICENSE
    - third-party-licenses.txt
  summary: A bundler for javascript and friends.
  homepage: https://github.com/webpack/webpack-cli
  repository: https://github.com/webpack/webpack-cli

extra:
  recipe-maintainers:
    - danielnachun
