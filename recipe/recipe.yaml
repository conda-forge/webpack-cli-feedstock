context:
  version: "7.0.0"

package:
  name: webpack-cli
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/webpack-cli/-/webpack-cli-${{ version }}.tgz
  sha256: aa43c882d605ad3538775322c0006e74f23a0e3f4a0b53f289bf03dfaf0e2253

build:
  number: 0
  noarch: generic

requirements:
  build:
    - nodejs
    - pnpm
    - pnpm-licenses
  run:
    - nodejs

tests:
  - script:
      - webpack-cli --help

about:
  license: MIT
  license_file:
    - LICENSE
    - third-party-licenses.txt
  summary: A bundler for javascript and friends.
  homepage: https://github.com/webpack/webpack-cli
  repository: https://github.com/webpack/webpack-cli

extra:
  recipe-maintainers:
    - danielnachun
